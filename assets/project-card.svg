<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <style>
      @keyframes spinCW {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes spinCCW {
        0% { transform: rotate(360deg); }
        100% { transform: rotate(0deg); }
      }
      @keyframes spinFast {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 0.9; transform: scale(1.05); }
      }
      @keyframes floatSlow {
        0%, 100% { transform: translateY(0px) translateX(0px); }
        50% { transform: translateY(-15px) translateX(5px); }
      }
      @keyframes floatUp {
        0% { transform: translateY(20px); opacity: 0; }
        50% { opacity: 0.8; }
        100% { transform: translateY(-80px); opacity: 0; }
      }
      @keyframes lightBeam {
        0% { transform: translateX(-300px) skewX(-25deg); }
        35%, 100% { transform: translateX(1200px) skewX(-25deg); }
      }
      @keyframes orbitParticle {
        0% { transform: rotate(0deg) translateX(120px) rotate(0deg); }
        100% { transform: rotate(360deg) translateX(120px) rotate(-360deg); }
      }

      .text-title {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
        font-weight: 800;
        font-size: 34px;
        letter-spacing: -0.5px;
      }
      .text-subtitle {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
        font-weight: 500;
        font-size: 16px;
        fill: #94A3B8;
        letter-spacing: 0.2px;
      }
      .text-feature {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
        font-weight: 500;
        font-size: 15px;
        fill: #E2E8F0;
        letter-spacing: 0.2px;
      }
      .text-chip {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
        font-weight: 600;
        font-size: 12px;
        fill: #F8FAFC;
        letter-spacing: 0.5px;
      }

      .spin-cw { animation: spinCW 20s linear infinite; transform-origin: 0px 0px; }
      .spin-ccw { animation: spinCCW 15s linear infinite; transform-origin: 0px 0px; }
      .spin-fast { animation: spinFast 6s linear infinite; transform-origin: 0px 0px; }
      .pulse-core { animation: pulseGlow 4s ease-in-out infinite; transform-origin: 0px 0px; }
      .beam-animated { animation: lightBeam 7s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      .orbit-dot { animation: orbitParticle 8s linear infinite; transform-origin: 0px 0px; }

      .p1 { animation: floatUp 6s ease-in-out infinite 0s; }
      .p2 { animation: floatUp 8s ease-in-out infinite 1.5s; }
      .p3 { animation: floatUp 7s ease-in-out infinite 3s; }
      .p4 { animation: floatUp 9s ease-in-out infinite 0.5s; }
      .p5 { animation: floatUp 6.5s ease-in-out infinite 4s; }
      .p6 { animation: floatUp 7.5s ease-in-out infinite 2s; }
    </style>

    <!-- Gradients -->
    <linearGradient id="bg-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="card-backlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glass-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.01"/>
    </linearGradient>

    <linearGradient id="glass-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.6"/>
      <stop offset="25%" stop-color="#2563EB" stop-opacity="0.2"/>
      <stop offset="75%" stop-color="#1E3A8A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.5"/>
    </linearGradient>

    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8FAFC">
        <animate attributeName="stop-color" values="#F8FAFC; #38BDF8; #F8FAFC" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>

    <linearGradient id="beam-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38BDF8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="chip-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0.5"/>
    </linearGradient>

    <linearGradient id="chip-border" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.2"/>
    </linearGradient>

    <linearGradient id="streak-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="blur-massive" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="glow-fx" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow-premium" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity="0.8"/>
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg-base)"/>

  <!-- Ambient Glowing Orbs -->
  <g filter="url(#blur-massive)">
    <circle cx="150" cy="100" r="200" fill="url(#glow-blue)"/>
    <circle cx="750" cy="250" r="220" fill="url(#glow-cyan)"/>
    <circle cx="450" cy="450" r="180" fill="url(#glow-blue)"/>
  </g>

  <!-- Dot Matrix Overlay -->
  <g opacity="0.1" fill="#38BDF8">
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1"/>
    </pattern>
    <rect width="900" height="500" fill="url(#dots)"/>
  </g>

  <!-- Background Floating Particles -->
  <g fill="#38BDF8">
    <circle cx="80" cy="400" r="2.5" class="p1" opacity="0.7" filter="url(#glow-fx)"/>
    <circle cx="250" cy="450" r="1.5" class="p2" opacity="0.5"/>
    <circle cx="400" cy="380" r="3" class="p3" opacity="0.8" filter="url(#glow-fx)"/>
    <circle cx="650" cy="420" r="2" class="p4" opacity="0.6"/>
    <circle cx="820" cy="350" r="1.5" class="p5" opacity="0.9"/>
    <circle cx="500" cy="100" r="2.5" class="p6" opacity="0.7" filter="url(#glow-fx)"/>
  </g>

  <!-- Central Card Backlight -->
  <rect x="40" y="40" width="820" height="420" rx="24" fill="url(#card-backlight)" filter="url(#blur-massive)"/>

  <!-- Light Beam Sweep Across Canvas -->
  <rect x="0" y="0" width="160" height="500" fill="url(#beam-grad)" class="beam-animated" opacity="0.4"/>

  <!-- Main Glassmorphism Panel -->
  <g filter="url(#shadow-premium)">
    <rect x="40" y="40" width="820" height="420" rx="24" fill="url(#glass-bg)" stroke="url(#glass-border)" stroke-width="1.5"/>
    <!-- Top Inner Highlight for Glass Realism -->
    <path d="M 64 41.5 L 836 41.5" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ================= LEFT CONTENT AREA ================= -->
  
  <g transform="translate(80, 0)">
    
    <!-- Title -->
    <text x="0" y="110" class="text-title" fill="url(#title-grad)">🚀 AI Test Engineering Platform</text>

    <!-- Subtitle -->
    <text x="0" y="150" class="text-subtitle">Enterprise AI-powered Test Engineering Platform</text>

    <!-- Features List -->
    <g transform="translate(0, 195)">
      <!-- Feature 1 -->
      <g transform="translate(0, 0)">
        <path d="M 2 8 L 7 13 L 18 2" fill="none" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-fx)"/>
        <text x="32" y="13" class="text-feature">AI Requirement Analysis</text>
      </g>
      
      <!-- Feature 2 -->
      <g transform="translate(0, 36)">
        <path d="M 2 8 L 7 13 L 18 2" fill="none" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-fx)"/>
        <text x="32" y="13" class="text-feature">AI Test Case Generation</text>
      </g>
      
      <!-- Feature 3 -->
      <g transform="translate(0, 72)">
        <path d="M 2 8 L 7 13 L 18 2" fill="none" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-fx)"/>
        <text x="32" y="13" class="text-feature">Selenium UI Automation</text>
      </g>
      
      <!-- Feature 4 -->
      <g transform="translate(0, 108)">
        <path d="M 2 8 L 7 13 L 18 2" fill="none" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-fx)"/>
        <text x="32" y="13" class="text-feature">REST API Automation</text>
      </g>
      
      <!-- Feature 5 -->
      <g transform="translate(0, 144)">
        <path d="M 2 8 L 7 13 L 18 2" fill="none" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-fx)"/>
        <text x="32" y="13" class="text-feature">Database Validation</text>
      </g>
      
      <!-- Feature 6 -->
      <g transform="translate(0, 180)">
        <path d="M 2 8 L 7 13 L 18 2" fill="none" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-fx)"/>
        <text x="32" y="13" class="text-feature">Enterprise Reporting</text>
      </g>
    </g>

    <!-- Bottom Badges -->
    <g transform="translate(0, 400)">
      <!-- Java -->
      <g transform="translate(0, 0)">
        <rect width="64" height="28" rx="14" fill="url(#chip-bg)" stroke="url(#chip-border)" stroke-width="1"/>
        <circle cx="12" cy="14" r="3.5" fill="#38BDF8" filter="url(#glow-fx)"/>
        <text x="24" y="18.5" class="text-chip">Java</text>
      </g>

      <!-- Manual Testing -->
      <g transform="translate(76, 0)">
        <rect width="134" height="28" rx="14" fill="url(#chip-bg)" stroke="url(#chip-border)" stroke-width="1"/>
        <circle cx="12" cy="14" r="3.5" fill="#38BDF8" filter="url(#glow-fx)"/>
        <text x="24" y="18.5" class="text-chip">Manual Testing</text>
      </g>

      <!-- Selenium -->
      <g transform="translate(222, 0)">
        <rect width="94" height="28" rx="14" fill="url(#chip-bg)" stroke="url(#chip-border)" stroke-width="1"/>
        <circle cx="12" cy="14" r="3.5" fill="#38BDF8" filter="url(#glow-fx)"/>
        <text x="24" y="18.5" class="text-chip">Selenium</text>
      </g>

      <!-- TestNG -->
      <g transform="translate(328, 0)">
        <rect width="84" height="28" rx="14" fill="url(#chip-bg)" stroke="url(#chip-border)" stroke-width="1"/>
        <circle cx="12" cy="14" r="3.5" fill="#38BDF8" filter="url(#glow-fx)"/>
        <text x="24" y="18.5" class="text-chip">TestNG</text>
      </g>

      <!-- SQL -->
      <g transform="translate(424, 0)">
        <rect width="60" height="28" rx="14" fill="url(#chip-bg)" stroke="url(#chip-border)" stroke-width="1"/>
        <circle cx="12" cy="14" r="3.5" fill="#38BDF8" filter="url(#glow-fx)"/>
        <text x="24" y="18.5" class="text-chip">SQL</text>
      </g>
    </g>
  </g>

  <!-- ================= RIGHT VISUAL GRAPHIC ================= -->
  
  <g transform="translate(680, 250)">
    <!-- Ambient Pulse Core -->
    <circle cx="0" cy="0" r="95" fill="#38BDF8" fill-opacity="0.1" filter="url(#blur-massive)" class="pulse-core"/>

    <!-- Outer Fast Energy Ring -->
    <g class="spin-fast">
      <circle cx="0" cy="0" r="120" fill="none" stroke="url(#streak-grad)" stroke-width="1.5" stroke-dasharray="100 650" stroke-linecap="round"/>
      <circle cx="120" cy="0" r="2.5" fill="#FFFFFF" filter="url(#glow-fx)"/>
    </g>

    <!-- Outer Tech Dashes (Clockwise) -->
    <g class="spin-cw">
      <circle cx="0" cy="0" r="100" fill="none" stroke="#38BDF8" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4 10 24 16"/>
      <circle cx="100" cy="0" r="3.5" fill="#38BDF8" filter="url(#glow-fx)"/>
      <circle cx="-100" cy="0" r="2.5" fill="#2563EB"/>
      <circle cx="0" cy="100" r="2" fill="#7DD3FC"/>
    </g>

    <!-- Inner Segmented Ring (Counter-Clockwise) -->
    <g class="spin-ccw">
      <circle cx="0" cy="0" r="75" fill="none" stroke="url(#glass-border)" stroke-width="2" stroke-dasharray="45 30 90 30"/>
      <circle cx="0" cy="-75" r="4" fill="#38BDF8" filter="url(#glow-fx)"/>
      <circle cx="0" cy="75" r="3" fill="#F8FAFC"/>
    </g>

    <!-- Orbiting Data Particle -->
    <circle cx="0" cy="0" r="2.5" fill="#E0F2FE" class="orbit-dot" filter="url(#glow-fx)"/>

    <!-- Inner Static Orbit Path -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#1E3A8A" stroke-width="1.5" stroke-opacity="0.8"/>

    <!-- Central AI Tech Core Hexagon -->
    <g style="animation: floatSlow 6s ease-in-out infinite;">
      <!-- Hexagon Glow Layer -->
      <polygon points="0,-36 31,-18 31,18 0,36 -31,18 -31,-18" fill="none" stroke="#38BDF8" stroke-width="3" filter="url(#glow-fx)" class="pulse-core"/>
      
      <!-- Main Hexagon Frame -->
      <polygon points="0,-36 31,-18 31,18 0,36 -31,18 -31,-18" fill="url(#shield-grad)" stroke="#60A5FA" stroke-width="1.5"/>
      
      <!-- Inner Geometry / AI Eye -->
      <circle cx="0" cy="0" r="14" fill="#0F172A" stroke="#38BDF8" stroke-width="2" filter="url(#glow-fx)"/>
      <circle cx="0" cy="0" r="6" fill="#38BDF8" class="pulse-core"/>
      
      <!-- Connectivity Nodes -->
      <line x1="0" y1="-14" x2="0" y2="-28" stroke="#38BDF8" stroke-width="1.5" opacity="0.6"/>
      <line x1="12" y1="7" x2="24" y2="14" stroke="#38BDF8" stroke-width="1.5" opacity="0.6"/>
      <line x1="-12" y1="7" x2="-24" y2="14" stroke="#38BDF8" stroke-width="1.5" opacity="0.6"/>
    </g>
  </g>
</svg>
